<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Single-page app redirect for GitHub Pages.
      // Strips the repo prefix and encodes the remaining path after "?".
      var segmentCount = 1; // /oi-website → 1 segment
      var l = window.location;
      var repo = l.pathname.split('/').slice(0, 1 + segmentCount).join('/');
      var rest = l.pathname.slice(repo.length) || '/';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        repo + '/?' + rest +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
