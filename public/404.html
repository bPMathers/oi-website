<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Single-page app redirect for GitHub Pages.
      // Encodes the full path into a query param and redirects to index.html.
      // 1 = number of path segments in the repo prefix (/oi-website → 1 segment)
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
          '/?p=/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
