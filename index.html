<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Observatoire Idéal — un poste d'écoute pour signaux non résolus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Decode the path redirected from 404.html back into history.
      (function (l) {
        if (l.search.length > 1 && l.search[1] === '/') {
          var path = l.search.slice(1).split('&')[0];
          var qs = l.search.slice(1).split('&').slice(1).join('&');
          window.history.replaceState(
            null,
            null,
            l.pathname.replace(/\/$/, '') + path +
              (qs ? '?' + qs : '') +
              l.hash
          );
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
